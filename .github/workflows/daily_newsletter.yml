name: Daily Newsletter

on:
  schedule:
    - cron: "0 2 * * *"   # 2:00am UTC = 7:30am IST every day
  workflow_dispatch:        # manual trigger from GitHub Actions tab

jobs:
  send-newsletter:
    runs-on: ubuntu-latest

    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
      GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
      NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
      NEWSLETTER_TO: ${{ secrets.NEWSLETTER_TO || vars.NEWSLETTER_TO }}
      NEWSLETTER_CC: ${{ secrets.NEWSLETTER_CC || vars.NEWSLETTER_CC }}
      NEWSLETTER_BCC: ${{ secrets.NEWSLETTER_BCC || vars.NEWSLETTER_BCC }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r insurance-brief/requirements.txt

      - name: Run newsletter
        run: python insurance-brief/main.py
